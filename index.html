<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>hello</title>
  </head>

  <body>
    <div class="todo-app">
      <div class="title">Todo App</div>

      <div class="input">
        <input type="text" placeholder="add a todo" class="box" />
        <div class="button">
          <div class="text">Add</div>
        </div>
      </div>

      <div class="item">
        <div>
          <input type="checkbox" class="checkbox" id="item1" />
          <label class="task" for="item1">吃饭</label>
        </div>
        <div class="del">del</div>
      </div>

      <div class="item">
        <div>
          <input type="checkbox" class="checkbox" id="item1" />
          <label class="task" for="item1">吃饭</label>
        </div>
        <div class="del">del</div>
      </div>

      <div class="item">
        <div>
          <input type="checkbox" class="checkbox" id="item1" />
          <label class="task" for="item1">吃饭</label>
        </div>
        <div class="del">del</div>
      </div>
    </div>
  </body>

  <style>
    body {
      display: flex;
      justify-content: center;
      /* align-items: center; */
      height: 100vh;
      margin: 0;
      background: linear-gradient(
        to right,
        rgb(113, 65, 168),
        rgba(44, 114, 251, 1)
      );
    }

    .todo-app {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      margin-top: 30px;
      width: 1000px;
      height: 500px;
      background-color: white;
      border-radius: 5px;
    }

    .title {
      margin-top: 20px;
      font-size: 32px;
      font-weight: bolder;
      text-align: center;
    }

    .input {
      display: flex;
      flex-direction: row;
    }

    input::placeholder {
      font-size: 17px;
      font-weight: 300;
    }

    input:hover::placeholder {
      background: linear-gradient(
        to right,
        rgb(113, 65, 168),
        rgba(44, 114, 251, 1)
      );
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      transition: 0.3s;
    }

    input:focus::placeholder {
      color: transparent;
    }

    .box {
      width: 550px;
      height: 50px;
      padding-left: 5px;
      border: 3px dolid rgb(183, 180, 180);
      border-radius: 15px 0 0 15px;
    }

    .box:hover {
      transform: scale(1.02);
      transition: 0.3s;
    }

    .button {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100px;
      height: auto;
      border-radius: 0 15px 15px 0;
      background: linear-gradient(
        to right,
        rgb(113, 65, 168),
        rgba(44, 114, 251, 1)
      );
    }

    .button:hover {
      transform: scale(1.05);
      cursor: pointer;
      transition: 0.3s;
    }

    .text {
      font-size: 20px;
      color: white;
    }

    .item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-left: 10px;
      padding-right: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      margin-top: 0px;
      width: 600px;
      height: 40px;
      border-radius: 20px;
    }

    .item:hover {
      transform: scale(1.02);
      transition: 0.2s;
    }

    input[type="text"] {
      font-size: 20px;
    }

    input[type="checkbox"] {
      width: 15px;
      height: 15px;
      cursor: pointer;
      accent-color: #8a2be2;
    }

    /* input[type="checkbox"]:checked + label {
      color: #888;
      text-decoration: line-through; 
      transition: all 0.2s ease;
    } */

    .item:has(input:checked) .task {
      text-decoration: line-through;
      color: #888;
      transition: 0.2s;
    }

    .item:has(input:checked) .del {
      text-decoration: line-through;
      color: rgb(247, 153, 153);
      transition: 0.2s;
    }

    .del {
      color: red;
    }
  </style>
</html>
